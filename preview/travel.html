<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>游玩攻略 - 云上·归墅民宿</title>
<style>
:root{--color-primary:#3d5347;--color-primary-light:#5b7b6f;--color-primary-dark:#2a3d33;--color-accent:#8b7355;--color-bg:#faf8f5;--color-bg-light:#f3f0eb;--color-text:#333330;--color-text-light:#6b6b66;--color-text-lighter:#999990;--color-white:#fff;--color-border:#e0dcd5;--color-warning:#c9954a;--color-shadow:rgba(0,0,0,0.06);--color-shadow-hover:rgba(0,0,0,0.10);--radius-sm:6px;--radius-md:10px;--radius-lg:16px;--font-serif:"Noto Serif SC","STSong","SimSun","Songti SC","KaiTi",serif;--font-sans:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;--shadow-sm:0 1px 3px var(--color-shadow);--shadow-md:0 4px 12px var(--color-shadow);--transition:0.25s cubic-bezier(0.4,0,0.2,1);--max-width:720px}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{font-size:16px;-webkit-font-smoothing:antialiased}
body{font-family:var(--font-sans);color:var(--color-text);background:var(--color-bg);line-height:1.7;min-height:100vh;display:flex;flex-direction:column}
h1,h2,h3,h4{font-family:var(--font-serif);font-weight:600;line-height:1.4;color:var(--color-text)}
h1{font-size:1.6rem}h2{font-size:1.35rem}h3{font-size:1.15rem}h4{font-size:1.05rem}
.container{max-width:var(--max-width);margin:0 auto;padding:0 1rem}
a{color:var(--color-primary);text-decoration:none}
.header{background:rgba(255,255,255,0.92);border-bottom:1px solid var(--color-border);position:sticky;top:0;z-index:100;backdrop-filter:blur(10px)}
.header-inner{max-width:var(--max-width);margin:0 auto;padding:0.6rem 1rem;display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:0.4rem;text-decoration:none}
.logo-icon{font-size:1.4rem}
.logo-text{font-family:var(--font-serif);font-size:1.15rem;font-weight:700;color:var(--color-primary-dark);letter-spacing:0.05em}
.nav-links{display:flex;gap:0.2rem}
.nav-links a{padding:0.35rem 0.7rem;border-radius:var(--radius-sm);font-size:0.9rem;color:var(--color-text-light);transition:all var(--transition)}
.nav-links a:hover{color:var(--color-primary);background:var(--color-bg-light)}
.page-header{background:linear-gradient(135deg,var(--color-primary-dark),var(--color-primary));color:var(--color-white);padding:2.5rem 1rem;text-align:center}
.page-header h1{color:var(--color-white);margin-bottom:0.3rem}
.page-header p{color:rgba(255,255,255,0.8);font-size:0.95rem}
.section-padding{padding:2rem 0}
.bg-light{background:var(--color-bg-light)}
.section-title{text-align:center;margin-bottom:0.4rem;color:var(--color-primary-dark)}
.section-desc{text-align:center;color:var(--color-text-light);margin-bottom:1.5rem;font-size:0.95rem}
/* Routes */
.routes-list{display:flex;flex-direction:column;gap:0.8rem}
.route-card{background:var(--color-white);border-radius:var(--radius-md);padding:1rem 1.2rem;box-shadow:var(--shadow-sm);transition:all var(--transition);cursor:pointer;display:block;color:var(--color-text)}
.route-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-md);color:var(--color-text)}
.route-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:0.4rem}
.route-card-header h3{font-size:1rem}
.route-card-desc{font-size:0.85rem;color:var(--color-text-light);margin-bottom:0.5rem;line-height:1.5}
.route-card-meta{display:flex;gap:0.8rem;font-size:0.8rem;color:var(--color-text-lighter);margin-bottom:0.5rem}
.rec-tag{color:var(--color-warning);font-weight:600}
.route-spots-preview{display:flex;flex-wrap:wrap;gap:0.3rem}
.spot-tag{font-size:0.72rem;background:var(--color-bg-light);color:var(--color-text-light);padding:0.15rem 0.5rem;border-radius:10px}
.spot-more{font-size:0.72rem;color:var(--color-text-lighter)}
.difficulty-badge{font-size:0.75rem;padding:0.15rem 0.5rem;border-radius:10px;white-space:nowrap}
.difficulty-easy{background:#e8f5e9;color:#2e7d32}
.difficulty-medium{background:#fff8e1;color:#f57f17}
.difficulty-hard{background:#fce4ec;color:#c62828}
/* Foods */
.foods-list{display:flex;flex-direction:column;gap:0.8rem}
.food-card{background:var(--color-white);border-radius:var(--radius-md);padding:1rem 1.2rem;box-shadow:var(--shadow-sm)}
.food-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:0.3rem}
.food-category{font-size:0.72rem;background:var(--color-bg-light);padding:0.15rem 0.5rem;border-radius:10px;color:var(--color-text-light)}
.food-card-desc{font-size:0.85rem;color:var(--color-text-light);margin-bottom:0.5rem}
.food-card-meta{display:flex;flex-wrap:wrap;gap:0.8rem;font-size:0.8rem;color:var(--color-text-lighter);margin-bottom:0.4rem}
.food-address{font-size:0.82rem;color:var(--color-text-light);margin-bottom:0.5rem}
/* Modal */
.modal{position:fixed;inset:0;z-index:300;display:none;align-items:center;justify-content:center;padding:1rem}
.modal.show{display:flex}
.modal-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.4);backdrop-filter:blur(2px)}
.modal-content{position:relative;background:var(--color-white);border-radius:var(--radius-lg);padding:1.5rem;max-width:500px;width:100%;max-height:85vh;overflow-y:auto;box-shadow:0 8px 24px var(--color-shadow-hover)}
.btn-close{background:none;border:none;font-size:1.5rem;cursor:pointer;color:var(--color-text-light);margin-left:auto;display:block}
.btn{display:inline-flex;align-items:center;justify-content:center;padding:0.55rem 1.2rem;border-radius:var(--radius-sm);font-size:0.9rem;font-weight:500;cursor:pointer;border:none;transition:all var(--transition);font-family:var(--font-sans);text-decoration:none;gap:0.3rem}
.btn-primary{background:var(--color-primary);color:white}
.btn-primary:hover{background:var(--color-primary-dark);color:white}
.btn-outline{background:transparent;color:var(--color-primary);border:1.5px solid var(--color-primary)}
.btn-outline:hover{background:var(--color-primary);color:white}
.btn-sm{padding:0.3rem 0.8rem;font-size:0.8rem}
.spots-timeline{position:relative;padding-left:2rem;margin-top:0.8rem}
.spots-timeline::before{content:'';position:absolute;left:0.85rem;top:0;bottom:0;width:2px;background:var(--color-border)}
.spot-item{position:relative;margin-bottom:0.8rem}
.spot-num{position:absolute;left:-1.55rem;top:0.1rem;width:1.3rem;height:1.3rem;background:var(--color-primary);color:white;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.7rem;font-weight:700;z-index:1}
.route-tips{background:#fef9e7;border-radius:var(--radius-md);padding:1rem 1.2rem;margin:1rem 0;border-left:4px solid var(--color-warning)}
.route-tips h4{margin-bottom:0.3rem;color:#8b6d20}
.route-tips p{font-size:0.85rem;color:#6b5510;line-height:1.6}
.footer{background:var(--color-primary-dark);color:rgba(255,255,255,0.7);padding:1.5rem 1rem;text-align:center;margin-top:auto}
.footer p{font-size:0.8rem;margin-bottom:0.2rem;line-height:1.8}
.footer-copy{color:rgba(255,255,255,0.4);font-size:0.72rem!important;margin-top:0.4rem}
@media(min-width:768px){.foods-list{display:grid;grid-template-columns:repeat(2,1fr);gap:0.8rem}}
</style>
</head>
<body>

<header class="header">
    <div class="header-inner">
        <a href="index.html" class="logo"><span class="logo-icon">🏔️</span><span class="logo-text">云上·归墅</span></a>
        <nav class="nav-links">
            <a href="rooms.html">房型</a><a href="menu.html">点餐</a><a href="travel.html">攻略</a><a href="services.html">服务</a>
        </nav>
    </div>
</header>

<section class="page-header"><div class="container"><h1>🗺️ 游玩攻略</h1><p>索道上站步行5分钟 · 牯岭街步行10分钟 · 近如琴湖/锦绣谷</p></div></section>

<!-- 路线 -->
<section class="section-padding"><div class="container">
    <h2 class="section-title">🏞️ 推荐路线</h2>
    <p class="section-desc">点击路线卡片查看详细攻略</p>
    <div class="routes-list" id="routesList"></div>
</div></section>

<!-- 周边美食 -->
<section class="section-padding bg-light"><div class="container">
    <h2 class="section-title">🍜 周边美食</h2>
    <div class="foods-list" id="foodsList"></div>
</div></section>

<!-- 路线详情弹窗 -->
<div class="modal" id="routeModal">
    <div class="modal-overlay" onclick="closeRoute()"></div>
    <div class="modal-content" id="routeContent"></div>
</div>

<footer class="footer">
    <div class="footer-inner"><p>🏔️ 云上·归墅民宿 · 云无心以出岫，鸟倦飞而知还</p><p>📍 庐山山上·庐山风景名胜区大林沟路27号</p><p>📞 0792-XXXXXXX  |  索道上站步行5分钟  |  牯岭街步行10分钟</p><p class="footer-copy">© 2026 云上·归墅民宿 · 2016年开业</p></div>
</footer>

<script>
const routes = [
    {id:1,name:"经典一日游：庐山精华线",duration:"1天（约6-8小时）",difficulty:"easy",
     description:"适合首次来庐山的游客，打卡最具代表性的景点，感受庐山的雄奇秀险。",
     spots:[{name:"含鄱口",desc:"庐山最佳日出观景点，远眺鄱阳湖，云海壮观"},{name:"五老峰",desc:"庐山标志性山峰，五峰并列如五位老人"},{name:"三叠泉",desc:"庐山第一瀑布，三级跌落，气势磅礴"},{name:"花径",desc:"白居易笔下'大林寺桃花'所在地"},{name:"如琴湖",desc:"状如提琴的秀美湖泊"}],
     tips:"建议7:00出发看日出，穿舒适运动鞋，带防晒和雨具（山上天气多变）",rec:true},
    {id:2,name:"深度两日游：庐山全景探秘",duration:"2天",difficulty:"medium",
     description:"慢节奏深度体验，涵盖自然风光、人文历史和山居生活。适合住1-2晚的旅客。",
     spots:[{name:"DAY1: 牯岭镇-花径-仙人洞-大天池-龙首崖",desc:"上午漫步牯岭镇，下午探索西线自然奇观"},{name:"DAY1夜: 牯岭镇正街",desc:"品尝庐山特色美食，逛文创小店"},{name:"DAY2: 含鄱口日出-五老峰-三叠泉-白鹿洞书院",desc:"早起看日出，打卡东线经典，下午感受千年书院文化"}],
     tips:"建议住1晚，第二天早起看日出。山上早晚温差大，带外套。三叠泉需一定体力，可乘缆车。",rec:true},
    {id:3,name:"文化之旅：庐山人文寻踪",duration:"1天",difficulty:"easy",
     description:"探访庐山深厚的文化底蕴，白鹿洞书院、东林寺、美庐别墅……感受千年文脉。",
     spots:[{name:"白鹿洞书院",desc:"中国四大书院之首，朱熹讲学之地"},{name:"东林寺",desc:"净土宗祖庭，千年古刹"},{name:"美庐别墅",desc:"蒋宋庐山避暑官邸"},{name:"庐山会议旧址",desc:"近代中国重要历史见证地"},{name:"庐山博物馆",desc:"了解庐山地质、文化、历史"}],
     tips:"白鹿洞书院和东林寺在山下，建议单独安排一天。"},
    {id:4,name:"徒步挑战：庐山穿越线",duration:"1天（约6-8小时徒步）",difficulty:"hard",
     description:"从好汉坡徒步登顶，适合户外爱好者和徒步玩家，全程约15公里。",
     spots:[{name:"好汉坡起点",desc:"从莲花洞出发"},{name:"半山亭",desc:"中途休息点"},{name:"牯岭镇",desc:"登顶终点"}],
     tips:"需较好体能，穿专业登山鞋，带足水和干粮。雨天切勿尝试！"},
    {id:5,name:"休闲漫步：牯岭镇半日闲",duration:"半天（约3-4小时）",difficulty:"easy",
     description:"适合不想太累的旅客，在牯岭镇周边悠闲漫步，品茶看书，感受山居慢生活。",
     spots:[{name:"如琴湖环湖",desc:"绕湖一周约1小时"},{name:"花径公园",desc:"白居易诗碑"},{name:"牯岭正街",desc:"逛小店、品小吃"},{name:"云上·归墅茶室",desc:"品云雾茶，看云卷云舒（大林沟路27号）"}],
     tips:"非常适合到达当天或离开前半天的安排。"}
];

const foods = [
    {name:"庐山老灶人家",category:"赣菜",desc:"地道九江菜，柴火灶烹饪，门口对联写着'庐山真面目，老灶好味道'",address:"牯岭镇正街68号",price_range:"人均 ¥60-100",must_try:"庐山石鸡、石耳炖鸡、鄱阳湖鱼头",rec:true},
    {name:"云雾山房素食",category:"素食",desc:"东林寺附近的山间素食馆，食材取自自家菜园，禅意十足",address:"东林寺旁200米",price_range:"人均 ¥40-70",must_try:"罗汉斋、茶香豆腐、桂花藕粉"},
    {name:"牯岭小吃街",category:"小吃",desc:"牯岭镇正街上的小吃聚集地，各种庐山特色小吃一网打尽",address:"牯岭镇正街中段",price_range:"人均 ¥20-50",must_try:"九江炒粉、庐山茶饼、桂花糕、山泉水豆腐脑",rec:true},
    {name:"山居茶寮",category:"茶馆",desc:"隐藏在竹林中的茶室，可品鉴庐山云雾茶，学习茶道，看云起云落",address:"牯岭镇环山路12号",price_range:"人均 ¥50-100",must_try:"明前云雾茶、桂花红茶、手工茶点"},
    {name:"庐山味道",category:"赣菜",desc:"牯岭镇上的网红餐厅，装修新中式风格，菜品精致，拍照好看",address:"牯岭镇正街102号",price_range:"人均 ¥80-130",must_try:"云雾茶香虾、石锅豆腐、桂花酒酿"},
    {name:"山野人家农家乐",category:"赣菜",desc:"庐山脚下的农家菜馆，土鸡土鸭现杀现做，野菜新鲜采摘",address:"庐山北门附近2公里",price_range:"人均 ¥50-80",must_try:"土鸡汤、腊肉炒笋、清炒野菜"}
];

const diffLabels = {easy:'🟢 轻松',medium:'🟡 适中',hard:'🔴 挑战'};
const diffClass = {easy:'difficulty-easy',medium:'difficulty-medium',hard:'difficulty-hard'};

// 渲染路线
document.getElementById('routesList').innerHTML = routes.map(r=>`
    <div class="route-card" onclick="showRoute(${r.id})">
        <div class="route-card-header">
            <h3>${r.name}</h3>
            <span class="difficulty-badge ${diffClass[r.difficulty]}">${diffLabels[r.difficulty]}</span>
        </div>
        <p class="route-card-desc">${r.description.substring(0,100)}...</p>
        <div class="route-card-meta"><span>⏱️ ${r.duration}</span>${r.rec?'<span class="rec-tag">⭐ 精选推荐</span>':''}</div>
        <div class="route-spots-preview">
            ${r.spots.map(s=>`<span class="spot-tag">${s.name}</span>`).join('')}
        </div>
    </div>`).join('');

// 渲染美食
document.getElementById('foodsList').innerHTML = foods.map(f=>`
    <div class="food-card">
        <div class="food-card-header"><h4>${f.name}</h4><span class="food-category">${f.category}</span></div>
        <p class="food-card-desc">${f.desc}</p>
        <div class="food-card-meta"><span>💰 ${f.price_range}</span><span>🥢 必点：${f.must_try}</span></div>
        <p class="food-address">📍 ${f.address}</p>
        <a href="https://uri.amap.com/marker?position=115.9797,29.5568&name=${encodeURIComponent(f.name)}" target="_blank" class="btn btn-outline btn-sm">🗺️ 导航前往</a>
    </div>`).join('');

// 路线详情弹窗
function showRoute(id){
    const r = routes.find(r=>r.id===id);
    if(!r)return;
    document.getElementById('routeContent').innerHTML = `
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:0.8rem">
            <h2 style="margin:0">${r.name}</h2>
            <button class="btn-close" onclick="closeRoute()">✕</button>
        </div>
        <div style="display:flex;gap:0.8rem;align-items:center;margin-bottom:0.8rem">
            <span class="difficulty-badge ${diffClass[r.difficulty]}">${diffLabels[r.difficulty]}</span>
            <span style="font-size:0.9rem;color:var(--color-text-light)">⏱️ ${r.duration}</span>
        </div>
        <p style="font-size:0.95rem;color:var(--color-text-light);line-height:1.8;margin-bottom:1rem">${r.description}</p>
        <h3 style="margin-bottom:0.6rem">🏞️ 途经景点</h3>
        <div class="spots-timeline">
            ${r.spots.map((s,i)=>`<div class="spot-item"><div class="spot-num">${i+1}</div><div><h4>${s.name}</h4><p style="font-size:0.85rem;color:var(--color-text-light)">${s.desc}</p></div></div>`).join('')}
        </div>
        ${r.tips?`<div class="route-tips"><h4>💡 小贴士</h4><p>${r.tips}</p></div>`:''}
        <a href="https://uri.amap.com/marker?position=115.9797,29.5568&name=牯岭镇起点" target="_blank" class="btn btn-primary" style="width:100%;margin-top:0.5rem">🗺️ 查看导航路线</a>`;
    document.getElementById('routeModal').classList.add('show');
}
function closeRoute(){document.getElementById('routeModal').classList.remove('show')}
</script>
</body>
</html>
