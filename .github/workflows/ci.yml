name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 检查环境
        run: |
          set -ex
          python --version
          pip --version

      - name: 安装依赖
        run: |
          set -ex
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: 运行测试
        run: |
          set -ex
          python -m pytest tests/ -v --tb=long 2>&1
