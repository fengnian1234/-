name: 数据库备份

on:
  schedule:
    # 每天 UTC 2:00（北京时间 10:00）
    - cron: "0 2 * * *"
  workflow_dispatch:  # 手动触发

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: 查找并上传数据库备份
        run: |
          if [ -f yunshang_bnb.db ]; then
            cp yunshang_bnb.db backup_$(date +%Y-%m-%d).db
            echo "数据库文件已复制"
          else
            echo "未找到 yunshang_bnb.db，跳过备份"
          fi

      - name: 上传备份制品
        uses: actions/upload-artifact@v4
        if: hashFiles('yunshang_bnb.db') != ''
        with:
          name: db-backup-${{ github.run_id }}
          path: backup_*.db
          retention-days: 7
