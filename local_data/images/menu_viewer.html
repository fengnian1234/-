<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>菜单图片 - OCR辅助查看</title>
<style>
body{margin:0;padding:1rem;background:#f0f0f0;font-family:sans-serif}
img{max-width:100%;height:auto;border:1px solid #ccc;box-shadow:0 2px 8px rgba(0,0,0,0.1)}
.controls{position:sticky;top:0;background:#fff;padding:0.5rem 1rem;border-bottom:1px solid #ccc;z-index:10;display:flex;gap:0.5rem;align-items:center}
.controls button{padding:0.4rem 0.8rem;font-size:0.9rem;cursor:pointer}
.controls input{width:60px;text-align:center;padding:0.3rem}
</style>
</head>
<body>
<div class="controls">
  <button onclick="zoomIn()">+ 放大</button>
  <button onclick="zoomOut()">- 缩小</button>
  <button onclick="zoomReset()">重置</button>
  <span>缩放: <input type="number" id="zoomVal" value="100" min="10" max="300" onchange="setZoom()">%</span>
  <span style="margin-left:1rem;color:#666">可用滚轮缩放，拖拽移动</span>
</div>
<div id="container" style="overflow:auto;max-height:85vh">
  <img id="menuImg" src="menu_display.jpg" alt="菜单">
</div>
<script>
let scale = 1;
const img = document.getElementById('menuImg');
const container = document.getElementById('container');
function zoomIn(){scale*=1.2;applyZoom()}
function zoomOut(){scale/=1.2;applyZoom()}
function zoomReset(){scale=1;applyZoom()}
function setZoom(){scale=parseInt(document.getElementById('zoomVal').value)/100;applyZoom()}
function applyZoom(){img.style.transform='scale('+scale+')';img.style.transformOrigin='0 0';document.getElementById('zoomVal').value=Math.round(scale*100)}
container.addEventListener('wheel',e=>{e.preventDefault();scale+=e.deltaY>0?-0.1:0.1;scale=Math.max(0.1,Math.min(3,scale));applyZoom()})
</script>
</body>
</html>
