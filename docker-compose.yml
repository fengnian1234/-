# ══════════════════════════════════════════════════════════
# 云上归墅 · Docker Compose
# 服务栈: Flask/Gunicorn + PostgreSQL + Nginx
# ══════════════════════════════════════════════════════════
version: "3.8"

services:
  # ── 数据库 ─────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: yunshang-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: yunshang_bnb
      POSTGRES_USER: yunshang
      POSTGRES_PASSWORD: ${DB_PASSWORD:-yunshang_prod_2026}
      TZ: Asia/Shanghai
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yunshang -d yunshang_bnb"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - yunshang-net

  # ── Flask 应用 ─────────────────────────────────────
  app:
    build: .
    container_name: yunshang-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      # 生产配置（通过 .env.prod 或环境变量传入）
      DATABASE_URL: postgresql://yunshang:${DB_PASSWORD:-yunshang_prod_2026}@db:5432/yunshang_bnb
      BASE_URL: ${BASE_URL:-https://your-domain.com}
      DEBUG: "false"
      SECRET_KEY: ${SECRET_KEY}
      WECHAT_TOKEN: ${WECHAT_TOKEN}
      WECHAT_APP_ID: ${WECHAT_APP_ID}
      WECHAT_APP_SECRET: ${WECHAT_APP_SECRET}
      WECHAT_ENCODING_AES_KEY: ${WECHAT_ENCODING_AES_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL:-https://api.deepseek.com/anthropic}
      AI_MODEL: ${AI_MODEL:-deepseek-chat}
      WECHAT_MCH_ID: ${WECHAT_MCH_ID}
      WECHAT_MCH_KEY: ${WECHAT_MCH_KEY}
      TZ: Asia/Shanghai
    volumes:
      # 持久化上传文件和生成的报告
      - uploads:/app/local_data
      - reports:/app/reports
    networks:
      - yunshang-net

  # ── Nginx 反向代理 ─────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: yunshang-nginx
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro          # SSL 证书目录（可选）
      - uploads:/usr/share/nginx/html/static:ro
    networks:
      - yunshang-net

volumes:
  pgdata:
  uploads:
  reports:

networks:
  yunshang-net:
    driver: bridge
