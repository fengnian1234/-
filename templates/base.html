<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>{% block title %}云上归墅{% endblock %}</title>
    <script>
    (function(){var t=localStorage.getItem('theme');if(!t)t=window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light';document.documentElement.setAttribute('data-theme',t);})();
    </script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    {% block extra_head %}{% endblock %}
</head>
<body>
    <!-- 顶部导航 -->
    <header class="header">
        <div class="header-inner">
            <a href="/" class="logo">
                <span class="logo-icon">🏔️</span>
                <span class="logo-text">云上归墅</span>
            </a>
            <nav class="nav-links">
                <a href="/rooms">房型</a>
                <a href="/menu">点餐</a>
                <a href="/travel">攻略</a>
                <a href="/services">服务</a>
            </nav>
            <button id="theme-toggle" class="theme-toggle" aria-label="切换深色/浅色模式" title="切换深色/浅色模式">
                <span class="theme-toggle-icon">🌙</span>
            </button>
        </div>
    </header>

    <!-- 主内容 -->
    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <!-- 底部 -->
    <footer class="footer">
        <div class="footer-inner">
            <p class="footer-poem">云无心以出岫，鸟倦飞而知还</p>
            <p>🏔️ 云上·归墅民宿 · U型三层山居小院</p>
            <p>📍 庐山山上·庐山风景名胜区大林沟路27号</p>
            <p>📞 16607927666  |  携程 4.7分 · 85条评价  |  2016年开业</p>
            <p class="footer-copy">© 2026 云上·归墅民宿 YunShang GuiShu</p>
        </div>
    </footer>

    <script>
    // 滚动入场动画
    (function(){
        var observer = new IntersectionObserver(function(entries){
            entries.forEach(function(e){ if(e.isIntersecting) e.target.classList.add('visible'); });
        }, {threshold: 0.1});
        document.querySelectorAll('.section-padding,.page-header,.hero,.quick-entry,.footer,.rooms-list,.routes-list,.foods-list,.menu-container,.feature-list,.faq-list,.review-carousel,.entry-grid,.intro-grid,.service-grid')
            .forEach(function(el){ el.classList.add('fade-up'); observer.observe(el); });
    })();
    (function(){
        var icon=document.querySelector('.theme-toggle-icon');
        if(icon)icon.textContent=document.documentElement.getAttribute('data-theme')==='dark'?'☀️':'🌙';
    })();
    document.getElementById('theme-toggle').addEventListener('click',function(){
        var c=document.documentElement.getAttribute('data-theme');
        var n=c==='dark'?'light':'dark';
        document.documentElement.setAttribute('data-theme',n);
        localStorage.setItem('theme',n);
        document.querySelector('.theme-toggle-icon').textContent=n==='dark'?'☀️':'🌙';
    });
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change',function(e){
        if(!localStorage.getItem('theme')){
            var n=e.matches?'dark':'light';
            document.documentElement.setAttribute('data-theme',n);
            var icon=document.querySelector('.theme-toggle-icon');
            if(icon)icon.textContent=n==='dark'?'☀️':'🌙';
        }
    });
    </script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
