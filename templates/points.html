{% extends "base.html" %}
{% block title %}积分中心 - 云上归墅{% endblock %}

{% block content %}
<section class="page-header">
    <div class="container">
        <h1>⭐ 积分中心</h1>
        <p>入住消费 · 签到 · 写评价 · 兑换好礼</p>
    </div>
</section>

<section class="section-padding">
    <div class="container">
        <!-- 积分余额卡片 -->
        <div id="pointsCard" style="background:linear-gradient(135deg,var(--color-primary-dark),var(--color-primary));color:white;border-radius:var(--radius-lg);padding:1.8rem;text-align:center;margin-bottom:1.5rem">
            <div style="font-size:0.85rem;opacity:0.8;margin-bottom:0.3rem">我的积分</div>
            <div id="pointsBalance" style="font-size:3rem;font-weight:700;font-family:var(--font-serif)">--</div>
            <div id="memberBadge" style="display:inline-block;background:rgba(255,255,255,0.2);padding:0.25rem 0.8rem;border-radius:20px;font-size:0.8rem;margin-top:0.3rem">--</div>
            <button onclick="doCheckin()" id="checkinBtn" style="margin-top:0.8rem;background:rgba(255,255,255,0.2);border:1px solid rgba(255,255,255,0.3);color:white;padding:0.5rem 1.2rem;border-radius:20px;cursor:pointer;font-size:0.85rem">📅 每日签到 +1分</button>
        </div>

        <!-- 积分获取方式 -->
        <h3 style="margin-bottom:0.8rem;color:var(--color-primary-dark)">💡 如何获取积分</h3>
        <div id="earnRules" style="display:grid;grid-template-columns:repeat(2,1fr);gap:0.5rem;margin-bottom:1.5rem"></div>

        <!-- 会员等级 -->
        <div id="membershipBar" style="background:var(--color-white);border:1px solid var(--color-border);border-radius:var(--radius-md);padding:0.9rem 1rem;margin-bottom:1.5rem;display:none">
            <div style="display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:0.4rem;font-size:0.78rem;color:var(--color-text-lighter)">
                <span>🥈 银卡</span><span>🥇 金卡</span><span>💎 钻石卡</span>
            </div>
            <div id="tierProgressBg" style="height:4px;background:var(--color-bg-light);border-radius:2px;position:relative;overflow:hidden">
                <div id="tierProgressFill" style="height:100%;background:var(--color-accent);border-radius:2px;transition:width 0.6s ease;width:0%"></div>
            </div>
            <div style="display:flex;justify-content:space-between;font-size:0.68rem;color:var(--color-text-lighter);margin-top:0.3rem">
                <span>0</span><span>3,000 分</span><span>8,000 分</span>
            </div>
            <div id="tierTip" style="text-align:center;font-size:0.72rem;color:var(--color-text-lighter);margin-top:0.4rem"></div>
        </div>

        <!-- 兑换商城 -->
        <h3 style="margin-bottom:0.8rem;color:var(--color-primary-dark)">🎁 兑换商城</h3>
        <div id="redeemItems" style="display:grid;grid-template-columns:repeat(2,1fr);gap:0.6rem;margin-bottom:1.5rem"></div>

        <!-- 近期记录 -->
        <h3 style="margin-bottom:0.8rem;color:var(--color-primary-dark)">📋 近期记录</h3>
        <div id="pointLogs" style="display:flex;flex-direction:column;gap:0.4rem"></div>
    </div>
</section>
{% endblock %}

{% block extra_scripts %}
<script>
function getGuestId() {
    let id = localStorage.getItem('guest_id');
    if (!id) {
        id = 'guest_' + Date.now().toString(36) + '_' + Math.random().toString(36).substr(2, 8);
        localStorage.setItem('guest_id', id);
    }
    return id;
}
const OPENID = getGuestId(); // 基于 localStorage 的访客标识，实际微信部署时替换为 wx.openid
let guestData = null;

async function loadPoints() {
    try {
        const resp = await fetch(`/api/points/${OPENID}`);
        const data = await resp.json();
        guestData = data.guest;
        renderAll(data);
    } catch(e) {
        document.getElementById('pointsBalance').textContent = '--';
    }
}

function renderAll(data) {
    // 积分余额
    const pts = data.guest ? data.guest.total_points : 0;
    const member = data.guest ? data.guest.membership_name : '银卡';
    const discount = data.guest ? Math.round((1-data.guest.discount)*100) : 5;
    document.getElementById('pointsBalance').textContent = pts;
    document.getElementById('memberBadge').textContent = `💳 ${member} · 享${discount}%折扣`;

    // 获取规则
    document.getElementById('earnRules').innerHTML = data.earn_rules.map(r => `
        <div style="background:var(--color-white);border:1px solid var(--color-border);border-radius:var(--radius-md);padding:0.8rem;font-size:0.85rem">
            <strong>${r.name}</strong>
            <span style="float:right;color:var(--color-accent);font-weight:700">+${r.points}分</span>
            <div style="color:var(--color-text-lighter);font-size:0.75rem;margin-top:0.2rem">${r.unit}</div>
        </div>
    `).join('');

    // 会员等级进度
    var bar = document.getElementById('membershipBar');
    if (data.guest && data.membership_info) {
        bar.style.display = 'block';
        var totalEarned = data.guest.total_earned || 0;
        var tiers = data.membership_info;
        var goldMin = tiers.gold ? tiers.gold.min_points : 3000;
        var diamondMin = tiers.diamond ? tiers.diamond.min_points : 8000;
        var pct = totalEarned >= diamondMin ? 100 : totalEarned >= goldMin ? 50 + (totalEarned-goldMin)/(diamondMin-goldMin)*50 : (totalEarned/goldMin)*50;
        document.getElementById('tierProgressFill').style.width = Math.min(100, pct) + '%';
        var tip;
        if (totalEarned >= diamondMin) {
            tip = '🎉 已达最高等级钻石卡，享9折+免费升级+专属管家';
        } else if (totalEarned >= goldMin) {
            tip = '距💎钻石卡还差 ' + (diamondMin - totalEarned).toLocaleString() + ' 分 · 当前享92折+免费延迟退房';
        } else {
            tip = '距🥇金卡还差 ' + (goldMin - totalEarned).toLocaleString() + ' 分 · 当前享95折';
        }
        document.getElementById('tierTip').textContent = tip;
    }

    // 兑换商品
    document.getElementById('redeemItems').innerHTML = data.redeem_items.map(item => `
        <div style="background:var(--color-white);border:1px solid var(--color-border);border-radius:var(--radius-md);padding:1rem;text-align:center">
            <div style="font-size:1rem;font-weight:600;margin-bottom:0.3rem">${item.name}</div>
            <div style="color:var(--color-accent);font-weight:700;font-size:1.1rem;margin-bottom:0.5rem">${item.points}分</div>
            <button onclick="doRedeem('${item.key}')" ${!data.guest || pts < item.points ? 'disabled' : ''}
                style="background:${pts>=item.points?'var(--color-primary)':'var(--color-border)'};color:${pts>=item.points?'white':'var(--color-text-lighter)'};border:none;padding:0.4rem 1rem;border-radius:20px;cursor:${pts>=item.points?'pointer':'not-allowed'};font-size:0.82rem">
                ${pts >= item.points ? '立即兑换' : '积分不足'}
            </button>
        </div>
    `).join('');

    // 积分记录
    const logsEl = document.getElementById('pointLogs');
    if (data.logs.length === 0) {
        logsEl.innerHTML = '<div style="text-align:center;color:var(--color-text-lighter);padding:1rem">暂无积分记录，完成首次入住后开始累积～</div>';
    } else {
        logsEl.innerHTML = data.logs.map(l => `
            <div style="display:flex;justify-content:space-between;align-items:center;background:var(--color-white);border:1px solid var(--color-border);border-radius:var(--radius-sm);padding:0.6rem 0.8rem;font-size:0.82rem">
                <span>${l.description}</span>
                <span style="font-weight:700;color:${l.points>0?'var(--color-success)':'var(--color-danger)'}">${l.points>0?'+':''}${l.points}分</span>
            </div>
        `).join('');
    }
}

async function doCheckin() {
    if (!guestData) {
        // 模拟首次签到 — 先创建积分记录
        await fetch('/api/points/earn', {
            method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({openid: OPENID, action: 'checkin'})
        });
    }
    const resp = await fetch('/api/points/earn', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({openid: OPENID, action: 'checkin'})
    });
    const result = await resp.json();
    if (result.success) {
        document.getElementById('checkinBtn').textContent = '✅ 已签到';
        document.getElementById('checkinBtn').disabled = true;
        loadPoints();
    } else {
        alert(result.message || '签到失败');
    }
}

async function doRedeem(itemKey) {
    if (!confirm('确认兑换？')) return;
    const resp = await fetch('/api/points/redeem', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({openid: OPENID, item: itemKey})
    });
    const result = await resp.json();
    alert(result.message);
    loadPoints();
}

loadPoints();
</script>
{% endblock %}
