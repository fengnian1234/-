<!DOCTYPE html>
<html lang="zh-CN" data-bnb="{{ bnb_id }}">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AI 管家 · {{ bnb.short_name }}</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/thin/style.css">
<style>
:root {
  --bg: #F8F5F1; --chat-bg: #FAF9F6;
  --text: #2D2A26; --text2: #8C8C8C;
  --pri: #7B5D3B; --pri-light: #ede4d8;
  --bubble-me: #FAF9F6; --bubble-you: #FAF9F6;
  --border: #E0DCD5;
}
[data-bnb="shanji"] {
  --bg: #F8F5F1; --chat-bg: #FAF9F6;
  --text: #2D2A26; --text2: #8C8C8C;
  --pri: #2C4335; --pri-light: #ede4d8;
  --bubble-me: #FAF9F6; --bubble-you: #FAF9F6;
  --border: #E0DCD5;
}
[data-bnb="donglinwai"] {
  --bg: #F8F5F1; --chat-bg: #FAF9F6;
  --text: #2D2A26; --text2: #8C8C8C;
  --pri: #4A5D78; --pri-light: #e4eaf2;
  --bubble-me: #FAF9F6; --bubble-you: #FAF9F6;
  --border: #E0DCD5;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system,"PingFang SC","Microsoft YaHei",sans-serif; background:var(--bg); height:100vh; display:flex; flex-direction:column; overflow:hidden; }

.chat-header { background:var(--pri); color:#fff; padding:12px 16px; display:flex; align-items:center; gap:10px; flex-shrink:0; }
.chat-header .avatar { width:36px; height:36px; border-radius:50%; background:rgba(255,255,255,.2); display:flex; align-items:center; justify-content:center; font-size:20px; }
.chat-header .info { flex:1; }
.chat-header .name { font-size:15px; font-weight:600; }
.chat-header .status { font-size:11px; opacity:.75; }
.chat-header .btn-reset { padding:4px 12px; border-radius:4px; border:1px solid rgba(255,255,255,.4); background:transparent; color:#fff; font-size:11px; cursor:pointer; }
/* 鉴权模式切换 */
.mode-toggle { display:flex; align-items:center; gap:4px; padding:4px 10px; border-radius:4px; border:1px solid rgba(255,255,255,.4); background:transparent; color:#fff; font-size:11px; cursor:pointer; transition:background .15s; white-space:nowrap; }
.mode-toggle:hover { background:rgba(255,255,255,.15); }
.mode-popup { position:absolute; top:48px; right:56px; background:var(--bubble-you); border-radius:4px; box-shadow:0 8px 30px rgba(0,0,0,0.12); z-index:30; padding:6px; display:none; gap:2px; flex-direction:column; min-width:180px; }
.mode-popup.show { display:flex; }
.mode-item { display:flex; align-items:center; gap:8px; padding:8px 14px; border-radius:4px; cursor:pointer; font-size:12px; color:var(--text); border:none; background:none; width:100%; text-align:left; }
.mode-item:hover { background:var(--pri-light); }
.mode-item.active { color:var(--pri); font-weight:600; }
.mode-item .mode-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.mode-item .mode-dot.green { background:#5b8c5a; }
.mode-item .mode-dot.blue { background:#5b7fbf; }
.mode-item .mode-dot.orange { background:#d4953a; }
.mode-item .mode-dot.gray { background:#8c8c8c; }

.quick-hints { display:flex; gap:6px; padding:10px 14px; overflow-x:auto; flex-shrink:0; background:var(--bubble-you); border-bottom:1px solid var(--border); }
.quick-hint { flex-shrink:0; padding:6px 14px; border-radius:2px; background:var(--pri-light); color:var(--pri); font-size:12px; cursor:pointer; border:none; white-space:nowrap; }
.quick-hint:active { opacity:.7; }

.chat-area { flex:1; overflow-y:auto; padding:12px 14px; background:var(--chat-bg); display:flex; flex-direction:column; gap:10px; }
.time-tag { text-align:center; font-size:11px; color:#999; margin:4px 0; }
.bubble { max-width:78%; padding:10px 14px; border-radius:4px; font-size:14px; line-height:1.75; word-break:break-word; white-space:pre-wrap; animation: fadeUp .25s ease; box-shadow:0 1px 2px rgba(0,0,0,0.02); }
.bubble.you { align-self:flex-start; background:var(--bubble-you); border-radius:4px 4px 4px 4px; border-left:3px solid var(--pri); }
.bubble.me { align-self:flex-end; background:var(--bubble-me); border-radius:4px; }
.bubble .meta { font-size:10px; color:#999; margin-top:6px; padding-top:6px; border-top:1px solid rgba(0,0,0,.06); }
@keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

.input-area { display:flex; gap:8px; padding:10px 14px; padding-bottom:max(10px, env(safe-area-inset-bottom)); background:var(--bubble-you); border-top:1px solid var(--border); flex-shrink:0; }
.input-area input { flex:1; padding:10px 14px; border:1px solid var(--border); border-radius:4px; font-size:14px; background:#FAF9F6; outline:none; }
.input-area input:focus { border-color:var(--pri); }
.input-area button { width:44px; height:44px; border-radius:4px; background:var(--pri); color:#fff; border:none; font-size:18px; cursor:pointer; flex-shrink:0; display:flex; align-items:center; justify-content:center; }

.typing { align-self:flex-start; padding:10px 16px; border-radius:4px; background:var(--bubble-you); display:none; box-shadow:0 1px 2px rgba(0,0,0,0.02); }
.typing.show { display:block; }
.typing span { display:inline-block; width:6px; height:6px; border-radius:50%; background:#bbb; animation: bounce 1.4s infinite; margin:0 2px; }
.typing span:nth-child(2) { animation-delay:.2s; }
.typing span:nth-child(3) { animation-delay:.4s; }
@keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-6px)} }

[data-theme="dark"] {
  --bg: #1E1C1A; --chat-bg: #242220;
  --text: #D8D5D0; --text2: #A09890;
  --pri: #9B7D5B; --pri-light: #243028;
  --bubble-me: #2A2824; --bubble-you: #2A2824;
  --border: #2E2C28;
}
[data-theme="dark"] .input-area { background: var(--color-bg-dark, #2A2824); }
[data-theme="dark"] .input-area input { background: var(--color-bg, #1E1C1A); color: var(--color-text, #D8D5D0); }
[data-theme="dark"] .quick-hints { background: var(--color-bg-dark, #2A2824); }
[data-theme="dark"] .chat-header { background: var(--pri); }
</style>
</head>
<body>

<div class="chat-header" style="position:relative">
  <div class="avatar"><i class="ph-thin ph-robot"></i></div>
  <div class="info">
    <div class="name" id="headerName">{{ bnb.short_name }} · AI 管家</div>
    <div class="status" id="modeStatus">加载中...</div>
  </div>
  <button class="mode-toggle" onclick="toggleModeMenu()" id="modeBtn">
    <span id="modeBtnLabel">鉴权</span> <i class="ph-thin ph-caret-down" style="font-size:10px"></i>
  </button>
  <button class="btn-reset" onclick="resetChat()">重置</button>
  <div class="mode-popup" id="modePopup">
    <button class="mode-item" data-mode="travel_advisor" onclick="setMode('travel_advisor')"><span class="mode-dot green"></span> 未预订 · 旅行顾问</button>
    <button class="mode-item" data-mode="pre_arrival" onclick="setMode('pre_arrival')"><span class="mode-dot blue"></span> 已预订 · 待入住</button>
    <button class="mode-item" data-mode="guest_butler" onclick="setMode('guest_butler')"><span class="mode-dot orange"></span> 已入住 · 管家服务</button>
    <button class="mode-item" data-mode="post_stay" onclick="setMode('post_stay')"><span class="mode-dot gray"></span> 已退房 · 复购关怀</button>
  </div>
</div>

<div class="quick-hints" id="quickHints">
  <button class="quick-hint" onclick="send('房型有哪些')"><i class="ph-thin ph-bed"></i> 房型</button>
  <button class="quick-hint" onclick="send('周边美食推荐')"><i class="ph-thin ph-bowl-food"></i> 美食</button>
  <button class="quick-hint" onclick="send('庐山一日游')"><i class="ph-thin ph-map-trifold"></i> 一日游</button>
  <button class="quick-hint" onclick="send('怎么到民宿')"><i class="ph-thin ph-car"></i> 交通</button>
  <button class="quick-hint" onclick="send('WiFi密码')"><i class="ph-thin ph-wifi-high"></i> WiFi</button>
  <button class="quick-hint" onclick="send('打扫卫生')"><i class="ph-thin ph-broom"></i> 打扫</button>
</div>

<div class="chat-area" id="chatArea">
  <div class="time-tag" id="timeTag"></div>
</div>

<div class="typing" id="typing"><span></span><span></span><span></span></div>

<div class="input-area">
  <input type="text" id="msgInput" placeholder="输入消息..." autofocus>
  <button onclick="send()"><i class="ph-thin ph-caret-right"></i></button>
</div>

<script>
// 接收模拟器主题同步
window.addEventListener('message', function(e) {
    if (e.origin !== window.location.origin) return;
    if (e.data && e.data.type === 'setTheme' && e.data.theme) {
        document.documentElement.setAttribute('data-theme', e.data.theme);
    }
});

const API = '/api/simulate-chat';
const OPENID = 'mp_test_user';
const BNB_ID = '{{ bnb_id }}';
let isTyping = false;
let currentMode = 'travel_advisor';

const MODE_LABELS = {
  travel_advisor: '未预订 · 旅行顾问',
  pre_arrival: '已预订 · 待入住',
  guest_butler: '已入住 · 管家服务',
  post_stay: '已退房 · 复购关怀',
};
const MODE_STATUS = {
  travel_advisor: '在线 · 免费旅行顾问',
  pre_arrival: '在线 · 已预订待入住',
  guest_butler: '在线 · 已入住专属管家',
  post_stay: '在线 · 离店复购关怀',
};

(function init(){
  document.getElementById('timeTag').innerText = new Date().toLocaleString('zh-CN');
  document.getElementById('msgInput').addEventListener('keydown', e => { if(e.key==='Enter') send(); });
  addSysMsg('你好！我是{{ bnb.short_name }}的 AI 管家 <i class="ph-thin ph-robot"></i>\n\n可以问我房型、美食、攻略、交通等问题，也可以直接说「打扫」「叫醒」等快捷指令～\n\n<i class="ph-thin ph-lightbulb"></i> 点击右上角「鉴权」按钮切换测试模式');

  // 读取 BnB 主题色 — 以自身 data-bnb 的 CSS 变量为准
  try {
    const color = getComputedStyle(document.documentElement).getPropertyValue('--pri').trim();
    if (color) document.querySelector('.chat-header').style.background = color;
  } catch(e){}

  // 默认设为旅行顾问模式
  setMode('travel_advisor', true);
})();

function addBubble(text, side, handler) {
  const area = document.getElementById('chatArea');
  const div = document.createElement('div');
  div.className = 'bubble ' + side;
  div.textContent = text;
  if (side === 'you' && handler) {
    const m = document.createElement('div');
    m.className = 'meta';
    const labels = {keyword:'关键词', ai_travel_advisor:'AI·旅行顾问', ai_pre_arrival:'AI·待入住', ai_guest_butler:'AI·已入住', ai_post_stay:'AI·复购关怀', fallback:'兜底'};
    m.textContent = labels[handler] || handler;
    div.appendChild(m);
  }
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

function addSysMsg(text) {
  const area = document.getElementById('chatArea');
  const div = document.createElement('div');
  div.style.cssText = 'text-align:center;font-size:12px;color:#999;padding:8px 12px;line-height:1.6;white-space:pre-wrap;';
  div.innerHTML = text;
  area.appendChild(div);
}

function showTyping(show) {
  isTyping = show;
  document.getElementById('typing').classList.toggle('show', show);
  document.getElementById('chatArea').scrollTop = document.getElementById('chatArea').scrollHeight;
}

async function send(text) {
  if (isTyping) return;
  const input = document.getElementById('msgInput');
  const content = text || input.value.trim();
  if (!content) return;
  if (!text) input.value = '';

  addBubble(content, 'me');
  showTyping(true);

  try {
    const r = await fetch(API, {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({content, openid: OPENID, bnb_id: BNB_ID})
    });
    const d = await r.json();
    showTyping(false);
    addBubble(d.reply, 'you', d.handler);
  } catch(e) {
    showTyping(false);
    addBubble('连接失败，请确认服务已启动', 'you', 'error');
  }
}

function toggleModeMenu() {
  document.getElementById('modePopup').classList.toggle('show');
}

// 点击外部关闭鉴权弹窗
document.addEventListener('click', function(e) {
  if (!e.target.closest('#modeBtn') && !e.target.closest('#modePopup')) {
    document.getElementById('modePopup').classList.remove('show');
  }
});

async function setMode(mode, silent) {
  currentMode = mode;
  document.getElementById('modeStatus').textContent = MODE_STATUS[mode] || mode;
  document.getElementById('modeBtnLabel').textContent = MODE_LABELS[mode] || mode;
  document.getElementById('modePopup').classList.remove('show');
  // 高亮当前选项
  document.querySelectorAll('.mode-item').forEach(function(el) {
    el.classList.toggle('active', el.dataset.mode === mode);
  });
  if (silent) return;
  try {
    await fetch('/api/simulate/mode', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({openid: OPENID, mode: mode})
    });
    // 重置对话
    var area = document.getElementById('chatArea');
    area.innerHTML = '<div class="time-tag">'+new Date().toLocaleString('zh-CN')+'</div>';
    addSysMsg('已切换至「' + MODE_LABELS[mode] + '」模式，有什么可以帮你的？');
  } catch(e) {
    addSysMsg('模式切换失败: ' + e.message);
  }
}

async function resetChat() {
  await fetch('/api/simulate/reset', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({openid: OPENID})
  });
  document.getElementById('chatArea').innerHTML = '<div class="time-tag">'+new Date().toLocaleString('zh-CN')+'</div>';
  addSysMsg('对话已重置，有什么可以帮你的？');
}
</script>
</body>
</html>
