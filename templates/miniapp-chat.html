<!DOCTYPE html>
<html lang="zh-CN" data-bnb="{{ bnb_id }}">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AI 管家 · {{ bnb.short_name }}</title>
<style>
:root {
  --bg: #f8faf7; --chat-bg: #eef2ec;
  --text: #3a4038; --text2: #7a8078;
  --pri: #6b9b7e; --pri-light: #eaf2ec;
  --bubble-me: #c8e6c9; --bubble-you: #fff;
  --border: #e4e8e0;
}
/* 山纪 — 茶褐暖调 */
[data-bnb="shanji"] {
  --bg: #faf7f0; --chat-bg: #f0ebe0;
  --text: #3a3020; --text2: #7a7060;
  --pri: #9b7a4a; --pri-light: #f2e8d4;
  --bubble-me: #e8d8b8; --bubble-you: #fffdf8;
  --border: #e0d8c0;
}
/* 东林外 — 禅灰蓝调 */
[data-bnb="donglinwai"] {
  --bg: #f5f7fa; --chat-bg: #eef1f6;
  --text: #2a2e38; --text2: #6a7078;
  --pri: #7b8daa; --pri-light: #e8edf4;
  --bubble-me: #d0d8e8; --bubble-you: #fcfdfe;
  --border: #d8dce4;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system,"PingFang SC","Microsoft YaHei",sans-serif; background:var(--bg); height:100vh; display:flex; flex-direction:column; overflow:hidden; }

/* 顶部 */
.chat-header { background:var(--pri); color:#fff; padding:12px 16px; display:flex; align-items:center; gap:10px; flex-shrink:0; }
.chat-header .avatar { width:36px; height:36px; border-radius:50%; background:rgba(255,255,255,.2); display:flex; align-items:center; justify-content:center; font-size:20px; }
.chat-header .info { flex:1; }
.chat-header .name { font-size:15px; font-weight:600; }
.chat-header .status { font-size:11px; opacity:.75; }
.chat-header .btn-reset { padding:4px 12px; border-radius:14px; border:1px solid rgba(255,255,255,.4); background:transparent; color:#fff; font-size:11px; cursor:pointer; }

/* 快捷提示 */
.quick-hints { display:flex; gap:6px; padding:10px 14px; overflow-x:auto; flex-shrink:0; background:var(--bubble-you); border-bottom:1px solid var(--border); }
.quick-hint { flex-shrink:0; padding:6px 14px; border-radius:16px; background:var(--pri-light); color:var(--pri); font-size:12px; cursor:pointer; border:none; white-space:nowrap; }
.quick-hint:active { opacity:.7; }

/* 聊天区 */
.chat-area { flex:1; overflow-y:auto; padding:12px 14px; background:var(--chat-bg); display:flex; flex-direction:column; gap:10px; }
.time-tag { text-align:center; font-size:11px; color:#999; margin:4px 0; }
.bubble { max-width:78%; padding:10px 14px; border-radius:8px; font-size:14px; line-height:1.6; word-break:break-word; white-space:pre-wrap; animation: fadeUp .25s ease; }
.bubble.you { align-self:flex-start; background:var(--bubble-you); border-radius:4px 12px 12px 12px; }
.bubble.me { align-self:flex-end; background:var(--bubble-me); border-radius:12px 4px 12px 12px; }
.bubble .meta { font-size:10px; color:#999; margin-top:6px; padding-top:6px; border-top:1px solid rgba(0,0,0,.06); }
@keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

/* 输入区 */
.input-area { display:flex; gap:8px; padding:10px 14px; padding-bottom:max(10px, env(safe-area-inset-bottom)); background:var(--bubble-you); border-top:1px solid var(--border); flex-shrink:0; }
.input-area input { flex:1; padding:10px 14px; border:1px solid var(--border); border-radius:22px; font-size:14px; background:#f5f6f7; outline:none; }
.input-area input:focus { border-color:var(--pri); }
.input-area button { width:44px; height:44px; border-radius:50%; background:var(--pri); color:#fff; border:none; font-size:18px; cursor:pointer; flex-shrink:0; display:flex; align-items:center; justify-content:center; }

/* 打字指示器 */
.typing { align-self:flex-start; padding:10px 16px; border-radius:12px; background:var(--bubble-you); display:none; }
.typing.show { display:block; }
.typing span { display:inline-block; width:6px; height:6px; border-radius:50%; background:#bbb; animation: bounce 1.4s infinite; margin:0 2px; }
.typing span:nth-child(2) { animation-delay:.2s; }
.typing span:nth-child(3) { animation-delay:.4s; }
@keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-6px)} }
</style>
</head>
<body>

<div class="chat-header">
  <div class="avatar">🤖</div>
  <div class="info">
    <div class="name" id="headerName">{{ bnb.short_name }} · AI 管家</div>
    <div class="status">在线 · 随时为您服务</div>
  </div>
  <button class="btn-reset" onclick="resetChat()">重置</button>
</div>

<div class="quick-hints" id="quickHints">
  <button class="quick-hint" onclick="send('房型有哪些')">🛏️ 房型</button>
  <button class="quick-hint" onclick="send('周边美食推荐')">🍜 美食</button>
  <button class="quick-hint" onclick="send('庐山一日游')">🗺️ 一日游</button>
  <button class="quick-hint" onclick="send('怎么到民宿')">🚗 交通</button>
  <button class="quick-hint" onclick="send('WiFi密码')">📶 WiFi</button>
  <button class="quick-hint" onclick="send('打扫卫生')">🧹 打扫</button>
</div>

<div class="chat-area" id="chatArea">
  <div class="time-tag" id="timeTag"></div>
</div>

<div class="typing" id="typing"><span></span><span></span><span></span></div>

<div class="input-area">
  <input type="text" id="msgInput" placeholder="输入消息..." autofocus>
  <button onclick="send()">➤</button>
</div>

<script>
const API = '/api/simulate-chat';
const OPENID = 'mp_test_user';
const BNB_ID = '{{ bnb_id }}';
let isTyping = false;

(function init(){
  document.getElementById('timeTag').innerText = new Date().toLocaleString('zh-CN');
  document.getElementById('msgInput').addEventListener('keydown', e => { if(e.key==='Enter') send(); });
  addSysMsg('你好！我是{{ bnb.short_name }}的 AI 管家 🤖\n\n可以问我房型、美食、攻略、交通等问题，也可以直接说「打扫」「叫醒」等快捷指令～');

  // 读取 BnB 主题色 — 以自身 data-bnb 的 CSS 变量为准
  try {
    const color = getComputedStyle(document.documentElement).getPropertyValue('--pri').trim();
    if (color) document.querySelector('.chat-header').style.background = color;
  } catch(e){}
})();

function addBubble(text, side, handler) {
  const area = document.getElementById('chatArea');
  const div = document.createElement('div');
  div.className = 'bubble ' + side;
  div.textContent = text;
  if (side === 'you' && handler) {
    const m = document.createElement('div');
    m.className = 'meta';
    const labels = {keyword:'关键词', ai_travel_advisor:'AI·旅行顾问', ai_pre_arrival:'AI·待入住', ai_guest_butler:'AI·已入住', ai_post_stay:'AI·复购关怀', fallback:'兜底'};
    m.textContent = labels[handler] || handler;
    div.appendChild(m);
  }
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

function addSysMsg(text) {
  const area = document.getElementById('chatArea');
  const div = document.createElement('div');
  div.style.cssText = 'text-align:center;font-size:12px;color:#999;padding:8px 12px;line-height:1.6;white-space:pre-wrap;';
  div.textContent = text;
  area.appendChild(div);
}

function showTyping(show) {
  isTyping = show;
  document.getElementById('typing').classList.toggle('show', show);
  document.getElementById('chatArea').scrollTop = document.getElementById('chatArea').scrollHeight;
}

async function send(text) {
  if (isTyping) return;
  const input = document.getElementById('msgInput');
  const content = text || input.value.trim();
  if (!content) return;
  if (!text) input.value = '';

  addBubble(content, 'me');
  showTyping(true);

  try {
    const r = await fetch(API, {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({content, openid: OPENID, bnb_id: BNB_ID})
    });
    const d = await r.json();
    showTyping(false);
    addBubble(d.reply, 'you', d.handler);
  } catch(e) {
    showTyping(false);
    addBubble('连接失败，请确认服务已启动', 'you', 'error');
  }
}

async function resetChat() {
  await fetch('/api/simulate/reset', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({openid: OPENID})
  });
  document.getElementById('chatArea').innerHTML = '<div class="time-tag">'+new Date().toLocaleString('zh-CN')+'</div>';
  addSysMsg('对话已重置，有什么可以帮你的？');
}
</script>
</body>
</html>
